name: Sync all GitHub Discussions

on:
  schedule:
    - cron: "15 */6 * * *"   # каждые 6 часов
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --quiet requests

      - name: Sync all discussions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: gonka-ai
          REPO_NAME: gonka
          OUTPUT_DIR: docs/gonka/discussion
        run: python .github/scripts/sync_all_discussions.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/gonka/discussion/
          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
          else
            git commit -m "chore(docs): sync GitHub Discussions"
            git push
          fi
