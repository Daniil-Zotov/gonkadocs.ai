site_name: Gonka Docs
site_url: https://daniil-zotov.github.io/gonkadocs/
repo_url: https://github.com/Daniil-Zotov/gonkadocs
repo_name: Daniil-Zotov/gonkadocs
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: _site

theme:
  name: material
  language: ru
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.instant
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Тёмная тема
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Светлая тема
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang:
        - ru
        - en
  - awesome-pages

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 4
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.caret

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Daniil-Zotov/gonkadocs

validation:
  omitted_files: warn
  absolute_links: ignore        # absolute_links - это те самые "/governance/..." из апстрима
  unrecognized_links: info
  anchors: info                 # битые якоря (#section) - только info, не warn
